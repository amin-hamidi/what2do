version: "3.9"

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001/api/v1
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8001:8000"
    env_file:
      - backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./backend/alembic:/app/alembic
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: what2do
      POSTGRES_PASSWORD: what2do
      POSTGRES_DB: what2do
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U what2do"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data

  worker:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A app.worker worker --loglevel=info
    env_file:
      - backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  beat:
    build:
      context: ./backend
      dockerfile: ../docker/backend.Dockerfile
    command: celery -A app.worker beat --loglevel=info
    env_file:
      - backend/.env
    volumes:
      - ./backend/app:/app/app
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
